<!DOCTYPE html>
<html lang="de">

<title>Parzelle 194</title>

<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --accent:#2d6a1f;
  --panel-bg:rgba(255,253,248,0.98);
  --text-dark:#2c1a0e;--text-mid:#5a4030;--text-muted:#8a7060;
  --border:rgba(139,105,20,0.22);
}
body{font-family:'Lato',sans-serif;background:#3a4a32;color:var(--text-dark);overflow:hidden}
#app{width:100%;height:100vh;display:flex;flex-direction:column}

#toolbar{
  background:rgba(255,252,245,0.97);border-bottom:1px solid var(--border);
  padding:9px 14px;display:flex;gap:10px;align-items:center;z-index:100;flex-shrink:0
}
#toolbar h1{font-family:'Playfair Display',serif;font-size:17px;font-weight:600;color:var(--accent);margin-right:6px;white-space:nowrap}
#search-wrap{position:relative;flex:1;max-width:400px}
#search-wrap input{
  width:100%;padding:8px 14px 8px 34px;border:1px solid var(--border);border-radius:22px;
  font-size:14px;background:#fffdf5;color:var(--text-dark);outline:none;font-family:'Lato',sans-serif
}
#search-wrap input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(45,106,31,.1)}
#search-wrap .si{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--text-muted);font-size:14px}

/* === GARDEN VIEW === */
#garden-wrap{
  flex:1;position:relative;overflow:hidden;cursor:grab;
  background:#5a7a4a;
  background-image:
    radial-gradient(circle at 30% 40%, rgba(140,180,90,.18) 0%, transparent 50%),
    radial-gradient(circle at 70% 60%, rgba(90,130,60,.15) 0%, transparent 50%);
}
#garden-wrap:active{cursor:grabbing}
#garden-canvas{position:absolute;transform-origin:0 0;will-change:transform}

/* === SVG BACKGROUND STYLING - inject natural colors via CSS === */
#bgsvg{display:block;filter:drop-shadow(0 4px 20px rgba(0,0,0,.25))}

/* Hide all scale text and the white background rect */
#bgsvg #rect2,
#bgsvg [id^="rect11"],
#bgsvg [id^="rect13"]:not([id="rect133"]):not([id="rect134"]):not([id="rect139"]):not([id="rect138"]),
#bgsvg [id="rect133"],
#bgsvg [id="rect134"]{display:none}

/* Garden outer frame — earthy boundary */
#bgsvg #aussenrahmen{
  fill:#9fc97a !important;
  stroke:#3e2c14 !important;
  stroke-width:2 !important;
}

/* === BED FILLS === */
#bgsvg #Kr__uterbeet{
  fill:#b89968 !important;
  stroke:#7d5e3a !important;
  stroke-width:1.2 !important;
}
#bgsvg #H__gelbeet{
  fill:#a08055 !important;
  stroke:#5a3e1f !important;
  stroke-width:1.2 !important;
}
#bgsvg #Gem__sebeet{
  fill:#a88860 !important;
  stroke:#5a3e1f !important;
  stroke-width:1.2 !important;
}
#bgsvg #path151{
  fill:#a88860 !important;
  stroke:#5a3e1f !important;
  stroke-width:1.2 !important;
}
#bgsvg #path137{
  fill:#a88860 !important;
  stroke:#5a3e1f !important;
  stroke-width:1.2 !important;
}
#bgsvg #Beet_,
#bgsvg #Beet_unten{
  fill:#a88860 !important;
  stroke:#7d5e3a !important;
  stroke-width:1.5 !important;
  stroke-dasharray:none !important;
}
#bgsvg #Totholzecke{
  fill:#5a3e1f !important;
  stroke:#2a1808 !important;
}

/* Compost */
#bgsvg #kompost rect{
  fill:#4a3018 !important;
  stroke:#2a1808 !important;
}
#bgsvg #kompost text{
  fill:#ffeec0 !important;
  font-weight:700 !important;
}

/* IBC Container - water tank */
#bgsvg #IBC_Container{
  fill:#7090a8 !important;
  stroke:#3e5a70 !important;
  stroke-width:1.2 !important;
}

/* Buildings - Terrasse */
#bgsvg #rect92{
  fill:#c4a47a !important;
  stroke:#7d5e3a !important;
  stroke-width:1.5 !important;
}

/* Schuppen */
#bgsvg #Schuppen{
  fill:#9c6e42 !important;
  stroke:#3e2c14 !important;
  stroke-width:1.5 !important;
}

/* Dashed inner lines should be subtle */
#bgsvg #path148,
#bgsvg #path150{
  stroke:#6a4828 !important;
  stroke-width:0.7 !important;
  opacity:0.4 !important;
  fill:none !important;
}

/* Tree/shrub circles - keep but style them */
#bgsvg circle[id="Pflaume"],
#bgsvg circle[id="Pfirsich"],
#bgsvg circle[id="Birne"],
#bgsvg circle[id="Kirsche"],
#bgsvg circle[id="Flieder"],
#bgsvg circle[id="baumstumpf"],
#bgsvg ellipse[id="Rhodendron"],
#bgsvg ellipse[id="Kornelkirsche"],
#bgsvg ellipse[id="Zierquitte"],
#bgsvg ellipse[id="Par__ckenstrauch"],
#bgsvg ellipse[id="Holunder"],
#bgsvg ellipse[id="Szchuanpeffer"],
#bgsvg circle[id="Berberitze"],
#bgsvg circle[id="Pfingstrose"]{
  display:none !important;
}

/* Text labels */
#bgsvg text{font-family:'Playfair Display', serif !important; fill:#3e2c14 !important;}
#bgsvg #text92,
#bgsvg #text96{
  fill:#3e2c14 !important;
  font-size:18px !important;
  font-weight:600 !important;
  font-style:italic !important;
}

/* Gate */
#bgsvg #eingang text,
#bgsvg #tor text{fill:#fff !important; font-weight:600 !important;}
#bgsvg #eingang line{stroke:#1f4a2a !important;}
#bgsvg #tor rect{fill:#1f4a2a !important; stroke:#0a2818 !important;}

/* Yellow path - more vibrant */
#bgsvg #hauptweg{
  stroke:#e8c850 !important;
  stroke-width:14 !important;
  opacity:0.92 !important;
}

/* Scale labels hidden */
#bgsvg #skala-rechts text,
#bgsvg #skala-unten text{display:none !important;}

/* === MARKERS === */
.marker{cursor:pointer}
.marker .halo{opacity:0;transition:opacity .2s}
.marker:hover .halo{opacity:1}
.marker .bg-circle{
  fill:#fffdf2;
  stroke:#7d5e3a;
  stroke-width:0.7;
  filter:drop-shadow(0 0.5px 1.2px rgba(0,0,0,.25));
  transition:all .15s
}
.marker:hover .bg-circle{stroke-width:1.2;fill:#fffce5}
.marker text.emoji{pointer-events:none;dominant-baseline:central;text-anchor:middle}

/* === PANEL === */
#panel{
  position:fixed;right:0;top:0;width:360px;height:100vh;
  background:var(--panel-bg);
  transform:translateX(100%);transition:transform .35s cubic-bezier(.22,1,.36,1);
  z-index:200;overflow-y:auto;box-shadow:-8px 0 30px rgba(0,0,0,0.15);
  display:flex;flex-direction:column
}
#panel.open{transform:translateX(0)}
#phero{
  width:100%;height:170px;display:flex;align-items:center;justify-content:center;
  font-size:90px;flex-shrink:0;
  background:linear-gradient(135deg,#c4dca4,#9fc97a 60%,#7eb05b);
  position:relative
}
#phero::after{content:'';position:absolute;left:0;right:0;bottom:0;height:30px;background:linear-gradient(to bottom,transparent,var(--panel-bg))}
#pclose{
  position:absolute;top:14px;right:14px;width:36px;height:36px;border-radius:50%;
  border:none;background:rgba(255,255,255,.95);cursor:pointer;font-size:17px;
  display:flex;align-items:center;justify-content:center;color:var(--text-dark);
  box-shadow:0 2px 6px rgba(0,0,0,.18);z-index:5;transition:all .2s
}
#pclose:hover{background:#fff;transform:rotate(90deg)}
#pcontent{padding:18px 22px 36px;flex:1}
#pname{font-family:'Playfair Display',serif;font-size:26px;font-weight:600;color:var(--text-dark);line-height:1.1;margin-bottom:3px}
#pbot{font-size:13.5px;font-style:italic;color:var(--text-muted);margin-bottom:18px}
#pdesc{font-size:14px;line-height:1.7;color:var(--text-mid);margin-bottom:20px}
.ctitle{font-family:'Playfair Display',serif;font-size:14px;font-weight:600;color:var(--accent);margin-bottom:12px;display:flex;align-items:center;gap:8px}
.ctitle::before{content:'';display:block;width:18px;height:2px;background:var(--accent);border-radius:1px}
.cgrid{display:grid;grid-template-columns:1fr 1fr;gap:9px}
.cc{background:#f5f1e8;border-radius:9px;padding:11px 13px}
.ccl{font-size:10.5px;color:var(--text-muted);text-transform:uppercase;letter-spacing:.08em;font-weight:700;margin-bottom:4px}
.ccv{font-size:13px;color:var(--text-dark);line-height:1.35}
.ccs{background:#eef5e8;border-radius:9px;padding:11px 13px;margin-top:9px;grid-column:1/-1}

/* === CONTROLS === */
#zctrl{position:absolute;bottom:16px;right:16px;display:flex;flex-direction:column;gap:5px;z-index:50}
.zbtn{
  width:40px;height:40px;background:rgba(255,252,245,.96);border:1px solid var(--border);
  border-radius:10px;font-size:19px;cursor:pointer;display:flex;align-items:center;justify-content:center;
  color:var(--text-dark);box-shadow:0 2px 5px rgba(0,0,0,.15);transition:all .15s
}
.zbtn:hover{background:var(--accent);color:#fff;border-color:var(--accent)}
#status{
  position:absolute;bottom:16px;left:16px;background:rgba(255,252,245,.96);
  border:1px solid var(--border);border-radius:10px;padding:7px 14px;font-size:13px;
  color:var(--text-mid);z-index:50;font-weight:500;box-shadow:0 2px 5px rgba(0,0,0,.12)
}

@media(max-width:600px){
  #panel{width:100%}
  #toolbar{padding:8px 10px;gap:8px}
  #toolbar h1{font-size:15px}
}
</style>

, "svgY": 1191, "nameDe": "Ackerbohne", "nameBot": "Vicia faba", "emoji": "🫘", "desc": "Eiweißreich, fixiert Stickstoff im Boden.", "water": "Regelmäßig", "light": "Volle Sonne", "nutrients": "Wenig (Stickstoffsammler)", "special": "Einjährig · Bodenverbesserer · Essbar"}, {"id": 85, "svgX": 468.4468579848009, "svgY": 1316.4229753951054, "nameDe": "Knoblauch", "nameBot": "Allium sativum", "emoji": "🧄", "desc": "Im Herbst stecken, im Sommer ernten. Aromatische Knollen.", "water": "Mäßig", "light": "Volle Sonne", "nutrients": "Kompost im Herbst", "special": "Winterhart · Essbar · Heilpflanze"}, {"id": 86, "svgX": 465.9726987777227, "svgY": 1341.1147707496734, "nameDe": "Knoblauch", "nameBot": "Allium sativum", "emoji": "🧄", "desc": "Im Herbst stecken, im Sommer ernten. Aromatische Knollen.", "water": "Mäßig", "light": "Volle Sonne", "nutrients": "Kompost im Herbst", "special": "Winterhart · Essbar · Heilpflanze"}, {"id": 87, "svgX": 463.9809912113216, "svgY": 1365.8038952206898, "nameDe": "Knoblauch", "nameBot": "Allium sativum", "emoji": "🧄", "desc": "Im Herbst stecken, im Sommer ernten. Aromatische Knollen.", "water": "Mäßig", "light": "Volle Sonne", "nutrients": "Kompost im Herbst", "special": "Winterhart · Essbar · Heilpflanze"}, {"id": 88, "svgX": 462.7284424417494, "svgY": 1390.4889276607, "nameDe": "Knoblauch", "nameBot": "Allium sativum", "emoji": "🧄", "desc": "Im Herbst stecken, im Sommer ernten. Aromatische Knollen.", "water": "Mäßig", "light": "Volle Sonne", "nutrients": "Kompost im Herbst", "special": "Winterhart · Essbar · Heilpflanze"}, {"id": 89, "svgX": 462.3826061654378, "svgY": 1415.168940481581, "nameDe": "Knoblauch", "nameBot": "Allium sativum", "emoji": "🧄", "desc": "Im Herbst stecken, im Sommer ernten. Aromatische Knollen.", "water": "Mäßig", "light": "Volle Sonne", "nutrients": "Kompost im Herbst", "special": "Winterhart · Essbar · Heilpflanze"}, {"id": 90, "svgX": 463.00167317048056, "svgY": 1439.843611535359, "nameDe": "Knoblauch", "nameBot": "Allium sativum", "emoji": "🧄", "desc": "Im Herbst stecken, im Sommer ernten. Aromatische Knollen.", "water": "Mäßig", "light": "Volle Sonne", "nutrients": "Kompost im Herbst", "special": "Winterhart · Essbar · Heilpflanze"}, {"id": 91, "svgX": 464.52745266878406, "svgY": 1464.513262970008, "nameDe": "Knoblauch", "nameBot": "Allium sativum", "emoji": "🧄", "desc": "Im Herbst stecken, im Sommer ernten. Aromatische Knollen.", "water": "Mäßig", "light": "Volle Sonne", "nutrients": "Kompost im Herbst", "special": "Winterhart · Essbar · Heilpflanze"}, {"id": 92, "svgX": 466.7923909639163, "svgY": 1489.178822373651, "nameDe": "Knoblauch", "nameBot": "Allium sativum", "emoji": "🧄", "desc": "Im Herbst stecken, im Sommer ernten. Aromatische Knollen.", "water": "Mäßig", "light": "Volle Sonne", "nutrients": "Kompost im Herbst", "special": "Winterhart · Essbar · Heilpflanze"}, {"id": 93, "svgX": 469.53978089972566, "svgY": 1513.8417108937422, "nameDe": "Knoblauch", "nameBot": "Allium sativum", "emoji": "🧄", "desc": "Im Herbst stecken, im Sommer ernten. Aromatische Knollen.", "water": "Mäßig", "light": "Volle Sonne", "nutrients": "Kompost im Herbst", "special": "Winterhart · Essbar · Heilpflanze"}];
const svg = document.getElementById('bgsvg');
const wrap = document.getElementById('garden-wrap');
const canvas = document.getElementById('garden-canvas');
const SVGNS = 'http://www.w3.org/2000/svg';

let pz = {s:1, x:0, y:0};
let panState = null;
let query = '';

function drawMarkers(){
  let overlay = svg.querySelector('#markers');
  if(!overlay){
    overlay = document.createElementNS(SVGNS, 'g');
    overlay.setAttribute('id', 'markers');
    svg.appendChild(overlay);
  }
  overlay.innerHTML = '';
  const q = query.toLowerCase();
  let shown = 0;
  PLANTS.forEach(p => {
    const matches = !q || p.nameDe.toLowerCase().includes(q) || p.nameBot.toLowerCase().includes(q);
    const g = document.createElementNS(SVGNS, 'g');
    g.setAttribute('class', 'marker');
    g.setAttribute('transform', `translate(${p.svgX},${p.svgY})`);
    g.style.opacity = matches ? '1' : '0.15';
    g.dataset.id = p.id;

    const halo = document.createElementNS(SVGNS, 'circle');
    halo.setAttribute('class', 'halo');
    halo.setAttribute('r', '14');
    halo.setAttribute('fill', 'rgba(45,106,31,.15)');
    halo.setAttribute('stroke', '#2d6a1f');
    halo.setAttribute('stroke-width', '1.2');
    g.appendChild(halo);

    const bg = document.createElementNS(SVGNS, 'circle');
    bg.setAttribute('class', 'bg-circle');
    bg.setAttribute('r', '8');
    g.appendChild(bg);

    const txt = document.createElementNS(SVGNS, 'text');
    txt.setAttribute('class', 'emoji');
    txt.setAttribute('font-size', '11');
    txt.textContent = p.emoji;
    g.appendChild(txt);

    g.addEventListener('click', e => {
      e.stopPropagation();
      if(matches) openPanel(p);
    });

    overlay.appendChild(g);
    if(matches) shown++;
  });
  document.getElementById('status').textContent = `${shown} Pflanzen`;
}

function openPanel(p){
  document.getElementById('phero').textContent = p.emoji;
  document.getElementById('pname').textContent = p.nameDe;
  document.getElementById('pbot').textContent = p.nameBot;
  document.getElementById('pdesc').textContent = p.desc;
  document.getElementById('cgrid').innerHTML = [
    ['💧 Gießbedarf', p.water],
    ['☀️ Licht', p.light],
    ['🌱 Nährstoffe', p.nutrients]
  ].map(([l,v]) => `<div class="cc"><div class="ccl">${l}</div><div class="ccv">${v}</div></div>`).join('') +
  `<div class="cc ccs"><div class="ccl">✨ Besonderheiten</div><div class="ccv">${p.special}</div></div>`;
  document.getElementById('panel').classList.add('open');
}

document.getElementById('pclose').addEventListener('click', () => {
  document.getElementById('panel').classList.remove('open');
});

document.getElementById('search').addEventListener('input', e => {
  query = e.target.value;
  drawMarkers();
});

// === Smooth pan ===
function applyT(){ canvas.style.transform = `translate(${pz.x}px,${pz.y}px) scale(${pz.s})`; }

wrap.addEventListener('mousedown', e => {
  if(e.target.closest('.marker')) return;
  panState = {sx:e.clientX, sy:e.clientY, ox:pz.x, oy:pz.y};
});
window.addEventListener('mousemove', e => {
  if(!panState) return;
  pz.x = panState.ox + (e.clientX - panState.sx);
  pz.y = panState.oy + (e.clientY - panState.sy);
  applyT();
});
window.addEventListener('mouseup', () => { panState = null; });

// Touch
let tStart = null, tDist = 0, tInitS = 1, tCenter = null;
wrap.addEventListener('touchstart', e => {
  if(e.target.closest('.marker')) return;
  if(e.touches.length === 1){
    tStart = {sx:e.touches[0].clientX, sy:e.touches[0].clientY, ox:pz.x, oy:pz.y};
  } else if(e.touches.length === 2){
    const dx = e.touches[0].clientX - e.touches[1].clientX;
    const dy = e.touches[0].clientY - e.touches[1].clientY;
    tDist = Math.hypot(dx, dy);
    tInitS = pz.s;
    tCenter = {x:(e.touches[0].clientX+e.touches[1].clientX)/2, y:(e.touches[0].clientY+e.touches[1].clientY)/2};
  }
}, {passive:false});

wrap.addEventListener('touchmove', e => {
  if(e.touches.length === 2 && tDist){
    e.preventDefault();
    const dx = e.touches[0].clientX - e.touches[1].clientX;
    const dy = e.touches[0].clientY - e.touches[1].clientY;
    const nd = Math.hypot(dx, dy);
    pz.s = Math.max(.2, Math.min(6, tInitS * (nd/tDist)));
    applyT();
  } else if(tStart && e.touches.length === 1){
    e.preventDefault();
    pz.x = tStart.ox + (e.touches[0].clientX - tStart.sx);
    pz.y = tStart.oy + (e.touches[0].clientY - tStart.sy);
    applyT();
  }
}, {passive:false});

wrap.addEventListener('touchend', () => { tStart = null; tDist = 0; });

wrap.addEventListener('wheel', e => {
  e.preventDefault();
  const r = wrap.getBoundingClientRect();
  const px = e.clientX - r.left, py = e.clientY - r.top;
  const factor = e.deltaY < 0 ? 1.12 : 0.89;
  const newS = Math.max(.2, Math.min(6, pz.s * factor));
  // Zoom towards cursor
  pz.x = px - (px - pz.x) * (newS/pz.s);
  pz.y = py - (py - pz.y) * (newS/pz.s);
  pz.s = newS;
  applyT();
}, {passive:false});

document.getElementById('zi').addEventListener('click', () => {
  const cx = wrap.clientWidth/2, cy = wrap.clientHeight/2;
  const factor = 1.25;
  const newS = Math.min(6, pz.s * factor);
  pz.x = cx - (cx - pz.x) * (newS/pz.s);
  pz.y = cy - (cy - pz.y) * (newS/pz.s);
  pz.s = newS;
  applyT();
});
document.getElementById('zo').addEventListener('click', () => {
  const cx = wrap.clientWidth/2, cy = wrap.clientHeight/2;
  const factor = 0.8;
  const newS = Math.max(.2, pz.s * factor);
  pz.x = cx - (cx - pz.x) * (newS/pz.s);
  pz.y = cy - (cy - pz.y) * (newS/pz.s);
  pz.s = newS;
  applyT();
});
document.getElementById('zr').addEventListener('click', center);

function center(){
  const vb = svg.getAttribute('viewBox').split(' ').map(Number);
  const svgW = vb[2], svgH = vb[3];
  svg.style.width = svgW + 'px';
  svg.style.height = svgH + 'px';
  const cw = wrap.clientWidth, ch = wrap.clientHeight;
  pz.s = Math.min((cw-30)/svgW, (ch-30)/svgH);
  pz.x = (cw - svgW*pz.s)/2;
  pz.y = (ch - svgH*pz.s)/2;
  applyT();
}

drawMarkers();
center();
window.addEventListener('resize', center);
</script>
